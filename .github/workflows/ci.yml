name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      # Placeholders for build/type-check only; real keys belong in repo secrets for deploy workflows.
      VITE_SUPABASE_URL: https://placeholder.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-publishable-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate (lint, type-check, test, build, audit)
        run: npm run validate

      - name: Security audit
        run: npm audit --audit-level=moderate
